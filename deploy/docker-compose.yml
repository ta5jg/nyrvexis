# Local / staging stack: Postgres + gateway (Phase 13).
# From repo root: docker compose -f deploy/docker-compose.yml up --build
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: nyrvexis
      POSTGRES_PASSWORD: nyrvexis
      POSTGRES_DB: nyrvexis
    volumes:
      - kr_pg_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nyrvexis -d nyrvexis"]
      interval: 3s
      timeout: 5s
      retries: 10

  gateway:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gateway
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8787:8787"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8787/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s
    environment:
      NODE_ENV: production
      KR_HOST: "0.0.0.0"
      KR_PORT: "8787"
      KR_DATABASE_URL: postgres://nyrvexis:nyrvexis@db:5432/nyrvexis
      KR_AUTH_SECRET: ${KR_AUTH_SECRET:-dev-only-change-me-please-CHANGE-THIS-123456}
      KR_CORS_ORIGIN: "*"
      KR_STORE_DIR: /tmp/kr-data

volumes:
  kr_pg_data:
